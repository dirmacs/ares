# KasiNO A.R.E.S Configuration
# Main configuration file for A.R.E.S with KasiNO (Guardian) settings

# =============================================================================
# Server Configuration
# =============================================================================
[server]
host = "0.0.0.0"
port = 3000
log_level = "info"

# =============================================================================
# Authentication Configuration
# =============================================================================
[auth]
jwt_secret_env = "JWT_SECRET"
jwt_access_expiry = 900
jwt_refresh_expiry = 604800
api_key_env = "API_KEY"

# =============================================================================
# Database Configuration
# =============================================================================
[database]
url = "/app/data/kasino.db"

# =============================================================================
# LLM Providers
# =============================================================================
[providers.anthropic]
type = "anthropic"
api_key_env = "ANTHROPIC_API_KEY"
api_base = "https://api.anthropic.com/v1"
default_model = "claude-haiku-20240307"

[providers.ollama-local]
type = "ollama"
base_url = "http://localhost:11434"
default_model = "llama3"

# =============================================================================
# Model Configurations
# =============================================================================
[models.fast]
provider = "anthropic"
model = "claude-haiku-20240307"
temperature = 0.1
max_tokens = 300

[models.balanced]
provider = "anthropic"
model = "claude-sonnet-20241022"
temperature = 0.2
max_tokens = 500

[models.powerful]
provider = "anthropic"
model = "claude-sonnet-20241022"
temperature = 0.3
max_tokens = 1500

# =============================================================================
# Tools Configuration
# =============================================================================
[tools.calculator]
enabled = true
description = "Performs basic arithmetic operations"
timeout_secs = 10

[tools.web_search]
enabled = true
description = "Search the web using DuckDuckGo"
timeout_secs = 30

# =============================================================================
# KasiNO (Guardian) Configuration
# =============================================================================
[kasino]
# WhatsApp alert configuration
whatsapp_gateway = "https://doltares.fly.dev/api/whatsapp"
whatsapp_enabled = true

# Alert severity levels
critical_alerts = ["whatsapp", "dashboard"]
warning_alerts = ["dashboard"]
info_alerts = ["dashboard"]

# Data retention (days)
event_retention_days = 90
transaction_retention_days = 90

# Default device settings
default_block_mode = "aggressive"
report_interval_seconds = 30

# =============================================================================
# Agent Configurations - KasiNO Agents
# =============================================================================
# These reference the TOON config files in the agents/ directory

[agents.kasino-classifier]
config_file = "agents/kasino-classifier.toml"
enabled = true

[agents.kasino-risk]
config_file = "agents/kasino-risk.toml"
enabled = true

[agents.kasino-report]
config_file = "agents/kasino-report.toml"
enabled = true

[agents.kasino-transaction]
config_file = "agents/kasino-transaction.toml"
enabled = true

# =============================================================================
# Workflow Configurations
# =============================================================================
[workflows.default]
entry_agent = "kasino-classifier"
fallback_agent = "kasino-risk"
max_depth = 3
max_iterations = 5

[workflows.monitoring]
entry_agent = "kasino-risk"
max_depth = 2
max_iterations = 3
